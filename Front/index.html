<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="./1.0.sideBar/1.0.sideBar.css">
    <link rel="stylesheet" href="./2.0.toolsMenu/1.0.toolsMenu.css">
    <link rel="stylesheet" href="./3.0.toolsBar/1.0.toolsBar.css">
    <link rel="stylesheet" href="./4.0.content/1.0.content.css">
    <title>Document</title>
</head>
<body>
    <div class="ReperImmoPage">
        <div class="ReperImmoArea">
            
            <div id="sidebar"></div>
            <div id="toolsMenu"></div>

            <div class="Body">
                <div class="BodyArea">
                    <div id="toolsBar"></div>
                    <div id="content"></div>
                </div>
            </div>
        </div>
    </div>


    <script src="./3.0.ToolsBar/1.0.ToolsBar.js"></script>
    <script src="./4.0.content/1.0.content.js"></script>

    <script>loadAnnonces(0, 1000000000, 0, 1000000, 0, 1000)</script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            loadPartial('sidebar', './1.0.sideBar/1.0.sideBar.html');
            loadPartial('toolsMenu', './2.0.toolsMenu/1.0.toolsMenu.html', filtres);
            loadPartial('toolsBar', './3.0.toolsBar/1.0.toolsBar.html', gestionAnnonces);
            loadPartial('content', './4.0.content/1.0.content.html');
        });
        
        function loadPartial(id, url, callback) {
            fetch(url)
                .then(response => response.text())
                .then(data => {
                    document.getElementById(id).innerHTML = data;
                    if (callback) callback();
                });
        }
    </script>
</body>
</html>
