<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Preload des CSS pour éviter le FOUC -->
    <link rel="preload" href="index.css" as="style" onload="this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="index.css"></noscript>

    <link rel="preload" href="Front/1.0.SideBar/1.0.SideBar.css" as="style" onload="this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="Front/1.0.SideBar/1.0.SideBar.css"></noscript>

    <link rel="preload" href="Front/2.0.ToolsMenu/1.0.ToolsMenu.css" as="style" onload="this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="Front/2.0.ToolsMenu/1.0.ToolsMenu.css"></noscript>

    <link rel="preload" href="Front/3.0.ToolsBar/1.0.ToolsBar.css" as="style" onload="this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="Front/3.0.ToolsBar/1.0.ToolsBar.css"></noscript>

    <link rel="preload" href="Front/4.0.Content/1.0.content.css" as="style" onload="this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="Front/4.0.Content/1.0.content.css"></noscript>

    <title>ReperImmo</title>
</head>
<body>
    <div class="ReperImmoPage">
        <div class="ReperImmoArea">
            <div id="sidebar"></div>
            <div id="toolsMenu"></div>
            <div class="Body">
                <div class="BodyArea">
                    <div id="toolsBar"></div>
                    <div id="content"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Utilisation des nonces pour les scripts inline -->
    <script nonce="randomValue" src="./2.0.ToolsMenu/1.0.ToolsMenu.js"></script>
    <script nonce="randomValue" src="./3.0.ToolsBar/1.0.ToolsBar.js"></script>
    <script nonce="randomValue" src="./4.0.content/1.0.content.js"></script>

    <script nonce="randomValue">loadAnnonces()</script>

    <script nonce="randomValue">
        document.addEventListener('DOMContentLoaded', function () {
            loadPartial('sidebar', './1.0.sideBar/1.0.sideBar.html');
            loadPartial('toolsMenu', './2.0.toolsMenu/1.0.toolsMenu.html', filtres);
            loadPartial('toolsBar', './3.0.toolsBar/1.0.toolsBar.html', gestionAnnonces);
            loadPartial('content', './4.0.content/1.0.content.html');
        });

        function loadPartial(id, url, callback) {
            fetch(url)
                .then(response => response.text())
                .then(data => {
                    document.getElementById(id).innerHTML = data;
                    if (callback) callback();
                });
        }
    </script>
</body>
</html>
